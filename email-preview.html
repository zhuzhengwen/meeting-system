<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会议邀请邮件预览</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background: #e8edf7;
    margin: 0;
    padding: 32px 16px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    max-width: 580px;
    margin: 0 auto;
    box-shadow: 0 4px 24px rgba(37,99,235,0.10);
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 55%, #60a5fa 100%);
    padding: 32px 36px 28px;
    position: relative;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.30);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: #e0eaff;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .header h1 {
    color: #fff;
    margin: 0 0 8px;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: 0.3px;
  }
  .header-sub {
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Time block ── */
  .time-block {
    background: linear-gradient(135deg, #eff6ff, #dbeafe);
    border: 1px solid #bfdbfe;
    border-radius: 10px;
    margin: 24px 28px 0;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 0;
  }
  .time-col {
    flex: 1;
    text-align: center;
  }
  .time-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #2563eb;
    background: #dbeafe;
    border-radius: 4px;
    padding: 2px 8px;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .time-tag.end {
    color: #7c3aed;
    background: #ede9fe;
  }
  .time-date {
    font-size: 13px;
    color: #374151;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .time-hm {
    font-size: 28px;
    font-weight: 700;
    color: #1d4ed8;
    line-height: 1;
  }
  .time-hm.end {
    color: #7c3aed;
  }
  .time-sep {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 0 16px;
    color: #93c5fd;
  }
  .time-sep-line {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, #93c5fd, #c4b5fd);
  }
  .time-sep-icon {
    font-size: 16px;
  }
  .time-duration {
    font-size: 11px;
    color: #6b7280;
    margin-top: 4px;
    text-align: center;
  }

  /* ── Body ── */
  .body {
    padding: 20px 28px 24px;
  }
  .row {
    display: flex;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid #f3f4f6;
  }
  .row:last-child {
    border-bottom: none;
  }
  .row-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-right: 12px;
    margin-top: 1px;
  }
  .icon-blue   { background: #eff6ff; }
  .icon-green  { background: #f0fdf4; }
  .icon-purple { background: #faf5ff; }
  .icon-orange { background: #fff7ed; }
  .icon-gray   { background: #f9fafb; }
  .row-label {
    font-size: 12px;
    color: #9ca3af;
    margin-bottom: 2px;
    font-weight: 500;
  }
  .row-value {
    font-size: 14px;
    color: #111827;
    line-height: 1.6;
    font-weight: 500;
  }
  .row-value.desc {
    font-weight: 400;
    color: #374151;
    font-size: 13px;
  }

  /* ── Desc section ── */
  .desc-section {
    background: #f9fafb;
    border-radius: 8px;
    padding: 14px 16px;
    margin: 4px 0 0;
    border-left: 3px solid #60a5fa;
  }
  .desc-section p {
    margin: 0;
    font-size: 13px;
    color: #374151;
    line-height: 1.7;
  }

  /* ── Footer ── */
  .footer {
    padding: 16px 28px;
    background: #f9fafb;
    font-size: 12px;
    color: #9ca3af;
    border-top: 1px solid #f3f4f6;
    display: flex;
    align-items: center;
    gap: 6px;
  }
</style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="header-badge">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <circle cx="5" cy="5" r="4" fill="#93c5fd"/>
        <circle cx="5" cy="5" r="2" fill="#fff"/>
      </svg>
      会议邀请
    </div>
    <h1>2026年Q2业务复盘会议</h1>
    <div class="header-sub">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>MTG-20260424-143022-A3F8C1</span>
    </div>
  </div>

  <!-- Time block -->
  <div class="time-block">
    <div class="time-col">
      <div class="time-tag">开始</div>
      <div class="time-date">2026年04月28日 周二</div>
      <div class="time-hm">14:00</div>
    </div>
    <div class="time-sep">
      <div class="time-sep-line"></div>
      <span class="time-sep-icon">→</span>
      <div class="time-sep-line"></div>
      <div class="time-duration">2小时</div>
    </div>
    <div class="time-col">
      <div class="time-tag end">结束</div>
      <div class="time-date">2026年04月28日 周二</div>
      <div class="time-hm end">16:00</div>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <div class="row">
      <div class="row-icon icon-blue">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <div>
        <div class="row-label">会议地点</div>
        <div class="row-value">总部园区 · 第三会议室（301）</div>
      </div>
    </div>

    <div class="row">
      <div class="row-icon icon-green">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div>
        <div class="row-label">主持人</div>
        <div class="row-value">张伟</div>
      </div>
    </div>

    <div class="row">
      <div class="row-icon icon-purple">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
      </div>
      <div>
        <div class="row-label">主导部门</div>
        <div class="row-value">产品研发中心</div>
      </div>
    </div>

    <div class="row">
      <div class="row-icon icon-orange">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div style="flex:1">
        <div class="row-label">会议说明</div>
        <div class="desc-section">
          <p>本次会议将回顾 Q2 各业务线目标达成情况，并讨论 Q3 规划方向。请各部门负责人提前准备数据汇报材料，时长不超过 10 分钟。</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    此邮件由会议管理系统自动发送，请勿直接回复。
  </div>

</div>
</body>
</html>
