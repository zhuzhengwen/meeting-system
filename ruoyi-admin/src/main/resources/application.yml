# BPM 审批流对接配置
bpm:
  # 是否启用 BPM 审批（false 时预约直接通过，无需审批）
  enabled: false
  # BPM 服务根地址（不含路径），如 http://bpm.example.com
  url: http://bpm.example.com
  # BPM 中的流程定义 Key，与 BPM 侧约定
  process-def-key: meeting_approval
  # 本系统对外的回调地址（BPM 审批完成后调此接口）
  callback-url: http://your-server/mms/bpm/callback
  # 回调鉴权 Token，双方提前约定，建议使用随机强密码
  callback-token: CHANGE_ME_TO_A_STRONG_SECRET
  # HTTP 超时（毫秒）
  connect-timeout: 5000
  read-timeout: 10000

# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.4.0
  # 版权年份
  copyrightYear: 2021
  # 实例演示开关
  demoEnabled: true
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数组计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # tomcat最大线程数，默认为200
    max-threads: 800
    # Tomcat启动初始化的线程数，默认值25
    min-spare-threads: 30

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles: 
    active: postgresql
  # 文件上传
  servlet:
     multipart:
       # 单个文件大小
       max-file-size:  10MB
       # 设置总上传的文件大小
       max-request-size:  20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: localhost
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # 密码
    password: 
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
  # 邮件配置（启用邮件时需填写真实配置）
  mail:
    host: smtp.example.com
    port: 587
    username: meeting@example.com
    password: your-smtp-password
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# token配置
token:
    # 令牌自定义标识
    header: Authorization
    # 令牌密钥
    secret: abcdefghijklmnopqrstuvwxyz
    # 令牌有效期（默认30分钟）
    expireTime: 30
  
# MyBatis-Plus配置
mybatis-plus:
    # 搜索指定包别名
    typeAliasesPackage: com.ruoyi.**.domain
    # 配置mapper的扫描，找到所有的mapper.xml映射文件
    mapperLocations: classpath*:mapper/**/*Mapper.xml

# PageHelper分页插件
pagehelper: 
  helperDialect: postgresql
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql 

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api

# 邮件通知配置
mms:
  mail:
    # 是否启用邮件通知（true 时会议保存后自动发送邀请邮件）
    enabled: false
    # 发件人显示名称
    from-name: 会议管理系统

# Spring Mail（启用邮件时需填写真实配置，合并到上方 spring: 节点下）

# LDAP配置
ldap:
  # 是否启用LDAP登录
  enabled: false
  # LDAP服务器地址
  url: ldap://your-ldap-server:389
  # 搜索根节点
  base: dc=company,dc=com
  # 查询用服务账号DN
  userDn: cn=readonly,dc=company,dc=com
  # 查询用服务账号密码
  password: readonly_password
  # 用户搜索过滤器（AD用sAMAccountName，OpenLDAP用uid）
  userSearchFilter: (sAMAccountName={0})
  # LDAP属性映射
  attrs:
    department: department
    displayName: displayName
    email: mail
  # 自动创建的LDAP部门挂在哪个父节点下（sys_dept里需存在该节点）
  defaultDeptParentId: 100
  # LDAP用户首次登录时自动分配的角色ID（data_scope建议设为3=本部门）
  defaultRoleId: 2

# 防止XSS攻击
xss: 
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice/*
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*
