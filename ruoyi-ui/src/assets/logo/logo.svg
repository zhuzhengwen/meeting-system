<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- 外框 -->
  <rect width="40" height="40" rx="8" fill="#1a56db"/>
  <!-- 会议桌（俯视椭圆） -->
  <ellipse cx="20" cy="22" rx="10" ry="6" fill="none" stroke="white" stroke-width="2"/>
  <!-- 桌面填色 -->
  <ellipse cx="20" cy="22" rx="10" ry="6" fill="#2563eb"/>
  <!-- 座位圆点：上方3个 -->
  <circle cx="13" cy="14" r="2.2" fill="white"/>
  <circle cx="20" cy="12" r="2.2" fill="white"/>
  <circle cx="27" cy="14" r="2.2" fill="white"/>
  <!-- 座位圆点：下方2个 -->
  <circle cx="15" cy="31" r="2.2" fill="white" opacity="0.85"/>
  <circle cx="25" cy="31" r="2.2" fill="white" opacity="0.85"/>
  <!-- 桌子高亮线 -->
  <ellipse cx="20" cy="21" rx="6" ry="3" fill="none" stroke="white" stroke-width="0.8" opacity="0.4"/>
</svg>
